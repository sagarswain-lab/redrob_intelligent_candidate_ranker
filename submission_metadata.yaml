# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  We used ChatGPT to build and refine the core code logic, develop the
  candidate scoring formula and its weights, perform exploratory data
  analysis (EDA) on the candidate pool, and iteratively optimize the overall
  implementation. We also leveraged ChatGPT to draft documentation, write
  inline code comments, and outline the README.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage hybrid ranker. (1) Structured feature scoring across five axes
  — skill relevance (133 skills bucketed into 4 frequency tiers via EDA,
  weighted 0-14 by JD relevance and rarity), title tier (47 titles in 5
  bands, off-target titles penalized -20 per the JD's "Marketing Manager
  with AI skills" example), career/company tier (AI-native/FAANG/Indian
  product vs. consulting-only penalty vs. neutral filler companies),
  location (Noida/Pune > NCR/Mumbai/Hyderabad > rest of India > abroad), and
  behavioral availability (recency, open-to-work, recruiter response rate,
  notice period - directly implements the JD's "5% response rate, inactive
  6 months" down-weight example). 
  (2) A TF-IDF cosine-similarity hybrid
  lexical signal against a condensed JD reference text (chosen over a dense
  embedding model after profiling showed the dataset's free-text fields use
  only ~40-50 templates - TF-IDF captures the same template-membership
  signal at near-zero cost and with no model-download/network dependency).
  Three structural honeypot checks (expert-skill-with-0-duration count;
  years-of-experience vs. total career-history duration, both directions)
  exclude 66 candidates before ranking, validated to fire on a clean
  designed subset with near-zero overlap. Reasoning is generated from the
  same feature extraction (no hallucination by construction), with varied
  phrasing and, for ranks 41-100, varied sentence structure per candidate.
  Runtime ~58s / ~3.5GB on a single CPU core for all 100K candidates.
  Result: the 8 candidates sharing a unique "ideal" summary template and the
  dataset's 14 rarest skills land at ranks #1-#8; 0% honeypot rate in top-100.

