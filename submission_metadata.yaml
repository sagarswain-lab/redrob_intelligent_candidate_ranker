# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/sagarswain-lab/redrob_intelligent_candidate_ranker.git"


sandbox_link: "https://huggingface.co/spaces/sagar-03/redrob-intelligent-candidate-ranker"
# A hosted environment where rank.py can be run on a small sample.
# Ready-to-go in sandbox/hf_space/ (see sandbox/SANDBOX_SETUP.md, ~5 min
# setup: create a Space, upload 6 files or `hf upload`). It bundles the same
# rank.py + reference_data.py used for the full submission, plus a curated
# 58-candidate sample (the 8 "ideal" candidates + 3 deceptive honeypots + 47
# ordinary profiles). Tested end-to-end: top-8 == the 8 ideal candidates,
# honeypots excluded, ~2-3s runtime.

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# Single command, produces submission.csv from candidates.jsonl.
# Measured on the full 100K candidates, single CPU core, no network, no GPU:
#   - local machine (Asus vivobook 16x , "Ryzen 5, 16GB RAM">>): ~57s
#   - HuggingFace Spaces (free CPU basic tier): ~70s
# Both well under the 5-minute (300s) limit. Peak RAM ~3.5GB in both cases.

